name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      CI: "1"
      EXPO_PUBLIC_ROUTING_BASE_URL: ${{ secrets.EXPO_PUBLIC_ROUTING_BASE_URL || vars.EXPO_PUBLIC_ROUTING_BASE_URL }}
      EXPO_PUBLIC_MAP_STYLE_URL: ${{ secrets.EXPO_PUBLIC_MAP_STYLE_URL || vars.EXPO_PUBLIC_MAP_STYLE_URL }}
      EXPO_PUBLIC_MAP_TILE_ENDPOINT: ${{ secrets.EXPO_PUBLIC_MAP_TILE_ENDPOINT || vars.EXPO_PUBLIC_MAP_TILE_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show versions
        run: |
          node -v
          npm -v
          java -version

      - name: Fail fast on missing production env vars
        run: |
          required_vars=(
            EXPO_PUBLIC_ROUTING_BASE_URL
            EXPO_PUBLIC_MAP_STYLE_URL
          )

          missing=()
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              missing+=("${var_name}")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            printf '%s\n' "[release-env] Missing required env var(s): ${missing[*]}"
            printf '%s\n' "[release-env] Configure them in GitHub Actions Secrets or Variables (or build profile env) before running release."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Validate mobile env (production)
        env:
          MOBILE_ENV_MODE: production
        run: node scripts/validate-mobile-env.mjs

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          MOBILE_ENV_MODE: production
        run: |
          node ../../scripts/validate-mobile-env.mjs
          npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Show release outputs
        run: |
          ls -lah apps/mobile/android/app/build/outputs/apk/release || true
          find apps/mobile/android/app/build/outputs -maxdepth 4 -type f | sort

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: greenwave-release-apk
          path: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
