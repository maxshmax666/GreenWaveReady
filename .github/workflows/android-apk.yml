name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      CI: "1"
      EXPO_PUBLIC_ROUTING_BASE_URL: ${{ secrets.EXPO_PUBLIC_ROUTING_BASE_URL }}
      EXPO_PUBLIC_MAP_STYLE_URL: ${{ secrets.EXPO_PUBLIC_MAP_STYLE_URL }}
      EXPO_PUBLIC_MAP_TILE_ENDPOINT: ${{ secrets.EXPO_PUBLIC_MAP_TILE_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show versions
        run: |
          node -v
          npm -v
          java -version

      - name: Install dependencies
        run: npm install

      - name: Validate mobile runtime env (production)
        env:
          MOBILE_ENV_MODE: production
        run: npm run check:mobile-env

      - name: Prebuild Android
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Show release outputs
        run: |
          ls -lah apps/mobile/android/app/build/outputs/apk/release || true
          find apps/mobile/android/app/build/outputs -maxdepth 4 -type f | sort

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: greenwave-debug-apk
          path: |
            apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
