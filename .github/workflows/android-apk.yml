name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      CI: "1"
      EXPO_PUBLIC_ROUTING_BASE_URL: ${{ secrets.EXPO_PUBLIC_ROUTING_BASE_URL || vars.EXPO_PUBLIC_ROUTING_BASE_URL }}
      EXPO_PUBLIC_MAP_TILE_ENDPOINT: ${{ secrets.EXPO_PUBLIC_MAP_TILE_ENDPOINT || vars.EXPO_PUBLIC_MAP_TILE_ENDPOINT }}
      EXPO_PUBLIC_MAP_STYLE_URL: ${{ secrets.EXPO_PUBLIC_MAP_STYLE_URL || vars.EXPO_PUBLIC_MAP_STYLE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show versions
        run: |
          node -v
          npm -v
          java -version

      - name: Fail fast on missing production env vars
        run: |
          mode="production"

          looks_placeholder() {
            local value="$1"
            local normalized

            normalized="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"

            [[ -z "${normalized//[[:space:]]/}" ]] && return 0
            [[ "$normalized" == '***' ]] && return 0
            [[ "$normalized" == *'placeholder'* ]] && return 0
            [[ "$normalized" == *'changeme'* ]] && return 0
            [[ "$normalized" == *'$''{{'* ]] && return 0
            [[ "$normalized" == *'}}'* ]] && return 0

            return 1
          }

          required_vars=(
            EXPO_PUBLIC_ROUTING_BASE_URL
            EXPO_PUBLIC_MAP_STYLE_URL
          )

          for var_name in "${required_vars[@]}"; do
            value="${!var_name:-}"

            if [[ -z "${value//[[:space:]]/}" ]]; then
              printf '%s\n' "[env-check] Missing required env var ${var_name} for ${mode}"
              exit 1
            fi

            if looks_placeholder "$value"; then
              printf '%s\n' "[env-check] ${var_name} looks like a masked/placeholder value in ${mode}. Configure a real public HTTPS URL."
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm install

      - name: Resolve production map style URL
        env:
          MAP_STYLE_URL_SECRET: ${{ secrets.EXPO_PUBLIC_MAP_STYLE_URL }}
          MAP_STYLE_URL_VAR: ${{ vars.EXPO_PUBLIC_MAP_STYLE_URL }}
        run: |
          is_invalid_map_style_url() {
            local value="$1"
            local lower

            lower="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"

            [[ -z "$value" ]] && return 0
            [[ "$value" == '***' ]] && return 0
            [[ "$lower" == *'placeholder'* ]] && return 0
            [[ "$lower" == *'changeme'* ]] && return 0
            [[ "$value" == *'$''{{'* ]] && return 0

            return 1
          }

          resolved_map_style_url=''
          source='default'

          if ! is_invalid_map_style_url "${MAP_STYLE_URL_SECRET:-}"; then
            resolved_map_style_url="$MAP_STYLE_URL_SECRET"
            source='secret'
          elif ! is_invalid_map_style_url "${MAP_STYLE_URL_VAR:-}"; then
            resolved_map_style_url="$MAP_STYLE_URL_VAR"
            source='variable'
          else
            resolved_map_style_url='https://demotiles.maplibre.org/style.json'
          fi

          printf '%s\n' "EXPO_PUBLIC_MAP_STYLE_URL=$resolved_map_style_url" >> "$GITHUB_ENV"
          printf '%s\n' "[release-env] EXPO_PUBLIC_MAP_STYLE_URL resolved from ${source}."

      - name: Validate mobile env (production)
        env:
          MOBILE_ENV_MODE: production
        run: node scripts/validate-mobile-env.mjs

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          MOBILE_ENV_MODE: production
        run: |
          node ../../scripts/validate-mobile-env.mjs
          npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Show release outputs
        run: |
          ls -lah apps/mobile/android/app/build/outputs/apk/release || true
          find apps/mobile/android/app/build/outputs -maxdepth 4 -type f | sort

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: greenwave-release-apk
          path: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
