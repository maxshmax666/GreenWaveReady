name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    env:
      CI: "1"
      EXPO_PUBLIC_ROUTING_BASE_URL: ${{ secrets.EXPO_PUBLIC_ROUTING_BASE_URL || vars.EXPO_PUBLIC_ROUTING_BASE_URL }}
      EXPO_PUBLIC_MAP_TILE_ENDPOINT: ${{ secrets.EXPO_PUBLIC_MAP_TILE_ENDPOINT || vars.EXPO_PUBLIC_MAP_TILE_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Show versions
        run: |
          node -v
          npm -v
          java -version

      - name: Resolve production public URLs
        shell: bash
        run: |
          set -euo pipefail

          DEFAULT_MAP_STYLE_URL="https://demotiles.maplibre.org/style.json"

          RAW_MAP_STYLE_URL="${{ secrets.EXPO_PUBLIC_MAP_STYLE_URL }}"
          if [ -z "$RAW_MAP_STYLE_URL" ]; then
            RAW_MAP_STYLE_URL="${{ vars.EXPO_PUBLIC_MAP_STYLE_URL }}"
          fi

          if [[ "$RAW_MAP_STYLE_URL" =~ ^https?://.+$ ]]; then
            FINAL_MAP_STYLE_URL="$RAW_MAP_STYLE_URL"
            echo "Using provided EXPO_PUBLIC_MAP_STYLE_URL"
          else
            FINAL_MAP_STYLE_URL="$DEFAULT_MAP_STYLE_URL"
            echo "Provided EXPO_PUBLIC_MAP_STYLE_URL is empty or invalid. Falling back to default."
          fi

          echo "EXPO_PUBLIC_MAP_STYLE_URL=$FINAL_MAP_STYLE_URL" >> "$GITHUB_ENV"
          echo "Resolved EXPO_PUBLIC_MAP_STYLE_URL for subsequent steps."

      - name: Debug resolved env
        shell: bash
        run: |
          node -e "const v=process.env.EXPO_PUBLIC_MAP_STYLE_URL||''; console.log('EXPO_PUBLIC_MAP_STYLE_URL present:', !!v); console.log('Looks like URL:', /^https?:\\/\\/.+/.test(v)); console.log('Length:', v.length);"

      - name: Fail fast on missing production env vars
        run: |
          mode="production"

          looks_placeholder() {
            local value="$1"
            local normalized
            local trimmed

            trimmed="$(printf '%s' "$value" | sed -E "s/^[[:space:]'\"]+//; s/[[:space:]'\"]+$//")"
            normalized="$(printf '%s' "$trimmed" | tr '[:upper:]' '[:lower:]')"

            [[ -z "${normalized//[[:space:]]/}" ]] && return 0
            [[ "$normalized" =~ ^\*+$ ]] && return 0
            [[ "$normalized" == *'placeholder'* ]] && return 0
            [[ "$normalized" == *'changeme'* ]] && return 0
            [[ "$normalized" == *'$''{{'* ]] && return 0
            [[ "$normalized" == *'}}'* ]] && return 0

            return 1
          }

          required_vars=(
            EXPO_PUBLIC_ROUTING_BASE_URL
          )

          for var_name in "${required_vars[@]}"; do
            value="${!var_name:-}"

            if [[ -z "${value//[[:space:]]/}" ]]; then
              printf '%s\n' "[env-check] Missing required env var ${var_name} for ${mode}"
              exit 1
            fi

            if looks_placeholder "$value"; then
              printf '%s\n' "[env-check] ${var_name} looks like a masked/placeholder value in ${mode}. Configure a real public HTTPS URL."
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm install

      - name: Validate mobile env (production)
        env:
          MOBILE_ENV_MODE: production
        run: node scripts/validate-mobile-env.mjs

      - name: Prebuild Android
        working-directory: apps/mobile
        env:
          MOBILE_ENV_MODE: production
        run: |
          node ../../scripts/validate-mobile-env.mjs
          npx expo prebuild --platform android --clean --non-interactive

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --stacktrace

      - name: Show release outputs
        run: |
          ls -lah apps/mobile/android/app/build/outputs/apk/release || true
          find apps/mobile/android/app/build/outputs -maxdepth 4 -type f | sort

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: greenwave-release-apk
          path: |
            apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
