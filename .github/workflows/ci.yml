name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: 'npm'
      - name: Validate lockfile is present
        run: test -f package-lock.json
      - name: Install dependencies (lockfile-enforced)
        run: npm ci
      - name: Validate mobile env validator (production-like URLs)
        env:
          MOBILE_ENV_MODE: production
          EXPO_PUBLIC_ROUTING_BASE_URL: https://routing.example.com
          EXPO_PUBLIC_MAP_STYLE_URL: https://maps.example.com/style.json
          EXPO_PUBLIC_MAP_TILE_ENDPOINT: https://maps.example.com/tiles/{z}/{x}/{y}.pbf
        run: npm run check:mobile-env
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
